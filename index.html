<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wiener.io</title>
    <style>
        body { margin:0; overflow:hidden; background:#1e293b; color:white; font-family: 'Segoe UI', Tahoma, sans-serif; }
        canvas { display:block; }
        
        #overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.85); z-index: 100;
        }
        
        .ui-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); min-width: 320px;
        }

        h1 { margin-top: 0; color: #ffcc00; font-size: 42px; text-shadow: 3px 3px 0px #8B4513; }
        .input-group { margin: 15px 0; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 11px; font-weight: bold; text-transform: uppercase; opacity: 0.7; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 10px; background: none; cursor: pointer; }
        button { width: 100%; padding: 16px; border-radius: 10px; border: none; background: #ffcc00; color: #0f172a; font-weight: 800; font-size: 18px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ffe066; transform: scale(1.02); }
        #stats-summary { display: none; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="ui-card">
        <div id="stats-summary">
            <h2 style="margin:0; color:#ff4444;">Wieners Wasted!</h2>
            <p>Kills: <span id="final-kills" style="color:#ffcc00; font-weight:bold;">0</span> | Max Length: <span id="final-score" style="color:#ffcc00; font-weight:bold;">0</span></p>
        </div>
        <h1>Wiener.io</h1>
        <div class="input-group">
            <label>Dachshund Name</label>
            <input type="text" id="name" value="LongBoi">
        </div>
        <div class="input-group">
            <label>Coat Color</label>
            <input type="color" id="color" value="#8B4513">
        </div>
        <button onclick="startGame()">UNLEASH THE HOUND</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

const WORLD_SIZE = 5000; 
const FOOD_COUNT = 500; 
const BOT_COUNT = 15; 
const FUNNY_NAMES = ["Bark_Twain", "Oscar_Mayer", "Frank_Furter", "Sausage_Slayer", "Glizzy_God", "Mustard_Mane", "Wiener_Winner", "Link_Lover", "Bun_Burner", "Sub_Woofer"];

let player, bots=[], foods=[], gameActive = false, kills = 0, mouseAngle = 0;

document.addEventListener('mousemove', e => {
    mouseAngle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
});

let playerBoosting = false;
document.addEventListener('mousedown', () => playerBoosting = true);
document.addEventListener('mouseup', () => playerBoosting = false);

class Dog {
    constructor(x, y, color, name, isPlayer = false, startLength = 40) {
        this.x = x; this.y = y;
        this.segments = [];
        this.length = startLength;
        this.angle = Math.random() * Math.PI * 2;
        this.color = color;
        this.name = name;
        this.isPlayer = isPlayer;
        this.isBoosting = false;
        for(let i=0; i<15; i++) this.segments.push({x:x, y:y});
    }

    width() { return 12 + this.length * 0.006; }

    update(allDogs, allFoods) {
        let speed = 5.2; 
        this.isBoosting = false;

        if (this.isPlayer) {
            this.angle = mouseAngle;
            if (playerBoosting && this.length > 30) { speed = 8.5; this.isBoosting = true; }
        } else {
            let avoidX = 0, avoidY = 0, danger = false;
            let distToPlayer = Math.hypot(this.x - player.x, this.y - player.y);

            // 1. MINIMAL AVOIDANCE (They are now much dumber)
            // They only see things 70 pixels away (very close)
            let senseDist = 70; 
            for(let d of allDogs) {
                if (d === this) continue;
                // They only check the very head of other dogs
                let s = d.segments[0];
                let dx = this.x - s.x;
                let dy = this.y - s.y;
                let distSq = dx*dx + dy*dy;
                if (distSq < senseDist * senseDist) {
                    avoidX += dx; avoidY += dy;
                    danger = true;
                }
            }

            if (danger) {
                let escapeAngle = Math.atan2(avoidY, avoidX);
                let diff = escapeAngle - this.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                this.angle += diff * 0.04; // Very slow reaction turn
            } else {
                // 2. SCAVENGER LOGIC (High Priority)
                let bestFood = null;
                let minDist = 500; 
                for(let f of allFoods) {
                    if(f.drop) {
                        let d = Math.hypot(this.x - f.x, this.y - f.y);
                        if(d < minDist) { minDist = d; bestFood = f; }
                    }
                }

                if(bestFood) {
                    let foodAngle = Math.atan2(bestFood.y - this.y, bestFood.x - this.x);
                    let diff = foodAngle - this.angle;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    this.angle += diff * 0.2; // They snap toward food instantly
                    speed = 8.0; 
                    this.isBoosting = true;
                } else if (distToPlayer < 700) {
                    // 3. AGGRESSIVE ATTACK
                    let targetX = player.x + Math.cos(player.angle) * 80; 
                    let targetY = player.y + Math.sin(player.angle) * 80;
                    let attackAngle = Math.atan2(targetY - this.y, targetX - this.x);
                    let diff = attackAngle - this.angle;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    this.angle += diff * 0.09; 
                    if(distToPlayer < 400) { speed = 7.5; this.isBoosting = true; }
                } else {
                    this.angle += (Math.random() - 0.5) * 0.1;
                }
            }

            // Boundary checks
            const margin = 80;
            if(this.x < margin || this.x > WORLD_SIZE-margin || this.y < margin || this.y > WORLD_SIZE-margin) {
                this.angle += 0.2;
            }
        }

        if (this.isBoosting) {
            this.length -= 0.1; 
            if (Math.random() > 0.9) foods.push(new Food(this.segments[this.segments.length-1].x, this.segments[this.segments.length-1].y, 3, 0.5, true));
        }

        this.x += Math.cos(this.angle) * speed;
        this.y += Math.sin(this.angle) * speed;
        this.segments.unshift({x: this.x, y: this.y});
        if (this.segments.length > this.length) this.segments.pop();
    }

    draw(camera) {
        let w = this.width();
        ctx.strokeStyle = this.color;
        ctx.lineWidth = w;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let s of this.segments) ctx.lineTo(s.x - camera.x, s.y - camera.y);
        ctx.stroke();

        let h = this.segments[0];
        let hx = h.x - camera.x, hy = h.y - camera.y;

        ctx.save();
        ctx.translate(hx, hy);
        ctx.rotate(this.angle);
        
        ctx.fillStyle = "#ff4444"; 
        ctx.fillRect(-w*0.2, -w*0.5, w*0.3, w);
        ctx.fillStyle = "#ffd700"; 
        ctx.beginPath(); ctx.arc(0, w*0.4, w*0.15, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.ellipse(w*0.5, 0, w*0.75, w*0.48, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(-2, -w*0.6, w*0.55, w*0.35, Math.PI/3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(-2, w*0.6, w*0.55, w*0.35, -Math.PI/3, 0, Math.PI*2); ctx.fill();
        
        ctx.fillStyle = "#111";
        ctx.beginPath(); ctx.arc(w*1.2, 0, w*0.18, 0, Math.PI*2); ctx.fill();
        
        const eyeRadius = 5.5; const pupilRadius = 2.5;
        const eyeLat = w * 0.35; const eyeLong = w * 0.3; 
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(eyeLong, -eyeLat, eyeRadius, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(eyeLong, eyeLat, eyeRadius, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "black";
        ctx.beginPath(); ctx.arc(eyeLong + 1, -eyeLat, pupilRadius, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(eyeLong + 1, eyeLat, pupilRadius, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        ctx.fillStyle = "white"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(this.name, hx, hy - w - 15);
    }
}

class Food {
    constructor(x, y, size=4, val=2, drop=false) {
        this.x=x; this.y=y; this.size=size; this.val=val; this.drop=drop;
        this.color = drop ? "#ffcc00" : `hsl(${Math.random()*360},80%,70%)`;
        this.life = 800; 
    }
    draw(camera) {
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x-camera.x, this.y-camera.y, this.size, 0, Math.PI*2); ctx.fill();
    }
}

player = new Dog(WORLD_SIZE/2, WORLD_SIZE/2, "#8B4513", "...", false);
for(let i=0; i<FOOD_COUNT; i++) foods.push(new Food(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE));
for(let i=0; i<BOT_COUNT; i++) spawnBot();

function spawnBot() {
    let colors = ['#e67e22', '#e74c3c', '#9b59b6', '#3498db', '#2ecc71', '#f1c40f'];
    let isLarge = Math.random() > 0.75;
    let randSize = isLarge ? (400 + Math.random() * 800) : (40 + Math.random() * 60);
    bots.push(new Dog(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, colors[Math.floor(Math.random()*colors.length)], FUNNY_NAMES[Math.floor(Math.random()*FUNNY_NAMES.length)], false, randSize));
}

function startGame() {
    kills = 0;
    player = new Dog(WORLD_SIZE/2, WORLD_SIZE/2, document.getElementById('color').value, document.getElementById('name').value, true);
    document.getElementById('overlay').style.display = 'none';
    gameActive = true;
}

function checkCollision(dog, others) {
    for (let o of others) {
        for (let i=0; i<o.segments.length; i++) {
            if (i < 12 && o === dog) continue; 
            let s = o.segments[i];
            let dx = dog.x - s.x, dy = dog.y - s.y;
            if (dx*dx + dy*dy < (o.width()/2 + 6)**2) return true;
        }
    }
    return false;
}

function loop() {
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,canvas.width,canvas.height);
    let camera = { x: player.x - canvas.width/2, y: player.y - canvas.height/2 };
    ctx.strokeStyle = '#334155'; ctx.lineWidth = 55; 
    ctx.strokeRect(-camera.x, -camera.y, WORLD_SIZE, WORLD_SIZE);

    let all = [player, ...bots];
    player.update(all, foods);
    bots.forEach(b => b.update(all, foods));

    for (let i = foods.length-1; i>=0; i--) {
        let f = foods[i];
        if (f.drop) { f.life--; if(f.life <= 0) { foods.splice(i,1); continue; } }
        
        let eaten = false;
        for(let d of all) {
            let dx = d.x - f.x, dy = d.y - f.y;
            if (dx*dx + dy*dy < (d.width()+12)**2) {
                d.length += (f.val * 0.6); 
                if (f.drop) foods.splice(i,1);
                else { f.x = Math.random()*WORLD_SIZE; f.y = Math.random()*WORLD_SIZE; }
                eaten = true;
                break;
            }
        }
    }

    if (gameActive) {
        if (player.x<0 || player.x>WORLD_SIZE || player.y<0 || player.y>WORLD_SIZE || checkCollision(player, bots)) {
            gameActive = false;
            document.getElementById('final-kills').innerText = kills;
            document.getElementById('final-score').innerText = Math.floor(player.length);
            document.getElementById('stats-summary').style.display = 'block';
            document.getElementById('overlay').style.display = 'flex';
        }
        for (let i = bots.length-1; i>=0; i--) {
            if (bots[i].x<0 || bots[i].x>WORLD_SIZE || bots[i].y<0 || bots[i].y>WORLD_SIZE || checkCollision(bots[i], [player, ...bots.filter((_,j)=>j!==i)])) {
                if (Math.hypot(bots[i].x-player.x, bots[i].y-player.y) < 500) kills++;
                for(let j=0; j<bots[i].segments.length; j+=8) foods.push(new Food(bots[i].segments[j].x, bots[i].segments[j].y, 6, 4, true));
                bots.splice(i,1); spawnBot();
            }
        }
    }

    foods.forEach(f => f.draw(camera));
    bots.forEach(b => b.draw(camera));
    if (gameActive) player.draw(camera);

    if (gameActive) {
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(canvas.width - 200, 20, 180, 230);
        ctx.fillStyle = "#ffcc00"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("LEADER BOARD", canvas.width - 110, 45);
        let lb = [player, ...bots].sort((a,b) => b.length - a.length).slice(0, 8);
        ctx.font = "14px sans-serif"; ctx.textAlign = "left";
        lb.forEach((d, i) => {
            ctx.fillStyle = (d === player) ? "#ffcc00" : "white";
            ctx.fillText(`${i+1}. ${d.name.substring(0,10)}`, canvas.width - 190, 75 + i*20);
            ctx.textAlign = "right"; ctx.fillText(Math.floor(d.length), canvas.width - 35, 75 + i*20);
            ctx.textAlign = "left";
        });
        const ms = 150, mx = canvas.width - 175, my = canvas.height - 175;
        ctx.strokeStyle = "#94a3b8"; ctx.lineWidth = 3; ctx.strokeRect(mx-2, my-2, ms+4, ms+4);
        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(mx, my, ms, ms);
        bots.forEach(b => { ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fillRect(mx + (b.x/WORLD_SIZE)*ms, my + (b.y/WORLD_SIZE)*ms, 2, 2); });
        ctx.fillStyle = "#ffcc00"; ctx.beginPath(); ctx.arc(mx+(player.x/WORLD_SIZE)*ms, my+(player.y/WORLD_SIZE)*ms, 3.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "white"; ctx.font = "bold 20px sans-serif";
        ctx.fillText(`Kills: ${kills} | Length: ${Math.floor(player.length)}`, 25, canvas.height - 30);
    }
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
