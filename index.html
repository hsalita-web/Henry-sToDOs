<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wiener.io</title>
<style>
  body { margin:0; overflow:hidden; background:#0f172a; color:white; font-family:Arial; }
  canvas { display:block; }
  #menu { position:absolute; top:20px; left:20px; z-index:20; background:rgba(0,0,0,0.6); padding:10px; border-radius:10px; }
</style>
</head>
<body>
<div id="menu">
  Name: <input id="name" value="Dachshund"><br>
  Color: <input type="color" id="color" value="#8B4513"><br>
  <button onclick="startGame()">Start</button>
</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const WORLD_SIZE = 2500;
const FOOD_COUNT = 400;
const BOT_COUNT = 12;

let mouseAngle = 0;
document.addEventListener('mousemove', e => {
  mouseAngle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
});

let boosting = false;
document.addEventListener('mousedown', ()=> boosting = true);
document.addEventListener('mouseup', ()=> boosting = false);

class Dog {
  constructor(x,y,color,name,isPlayer=false) {
    this.x = x; this.y = y;
    this.segments = [];
    this.length = 40;
    this.angle = Math.random() * Math.PI * 2;
    this.baseSpeed = 2.5;
    this.color = color;
    this.name = name;
    this.isPlayer = isPlayer;
  }

  width() { return 8 + this.length * 0.02; }

  update(allDogs) {
    let speed = this.baseSpeed;

    if (this.isPlayer) {
      this.angle = mouseAngle;
      if (boosting && this.length > 20) {
        speed = 5;
        this.length -= 0.2;
      }
    } else {
      // PREDATORY AI: Find closest target
      let target = null;
      let minDist = 600;
      allDogs.forEach(d => {
        if (d !== this) {
          let dist = Math.hypot(this.x - d.x, this.y - d.y);
          if (dist < minDist) { minDist = dist; target = d; }
        }
      });

      if (target) {
        // Aim slightly ahead of the target to cut them off
        let targetAngle = Math.atan2(target.y - this.y, target.x - this.x);
        let diff = targetAngle - this.angle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        this.angle += diff * 0.1; 
        if (minDist < 200) speed = 4; // Boost when close
      } else {
        this.angle += (Math.random()-0.5)*0.1;
      }
    }

    this.x += Math.cos(this.angle) * speed;
    this.y += Math.sin(this.angle) * speed;

    this.segments.unshift({x:this.x,y:this.y});
    while (this.segments.length > this.length) this.segments.pop();
  }

  draw(camera) {
    let w = this.width();
    ctx.strokeStyle = this.color;
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Draw Body
    ctx.beginPath();
    for (let i=0;i<this.segments.length;i++) {
      let s = this.segments[i];
      let x = s.x - camera.x;
      let y = s.y - camera.y;
      if (i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.stroke();

    let head = this.segments[0];
    let tail = this.segments[this.segments.length-1];
    if (!head || !tail) return;

    let hx = head.x - camera.x;
    let hy = head.y - camera.y;

    // Draw Tail (Pointy)
    let tx = tail.x - camera.x;
    let ty = tail.y - camera.y;
    ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(tx, ty, w/2, 0, Math.PI*2); ctx.fill();

    // Draw Head/Snout
    ctx.save();
    ctx.translate(hx, hy);
    ctx.rotate(this.angle);
    
    // The "Long" Snout
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.ellipse(w*0.7, 0, w*0.8, w*0.5, 0, 0, Math.PI*2);
    ctx.fill();

    // Nose
    ctx.fillStyle = "black";
    ctx.beginPath(); ctx.arc(w*1.4, 0, 3, 0, Math.PI*2); ctx.fill();

    // Eyes
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.arc(2, -w/3, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, w/3, 3, 0, Math.PI*2); ctx.fill();

    // Floppy Ears
    ctx.fillStyle = "#3e2723"; // Darker brown
    ctx.beginPath(); ctx.ellipse(0, -w/1.5, w/1.8, w/3, Math.PI/4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, w/1.5, w/1.8, w/3, -Math.PI/4, 0, Math.PI*2); ctx.fill();
    
    ctx.restore();

    ctx.fillStyle = "white";
    ctx.font = "bold 12px Arial";
    ctx.fillText(this.name, hx-10, hy - (w + 10));
  }
}

class Food {
  constructor(x,y,size=3,value=1.5) {
    this.x=x; this.y=y; this.size=size; this.value=value;
  }
  draw(camera) {
    ctx.fillStyle="rgba(255,255,255,0.8)";
    ctx.beginPath();
    ctx.arc(this.x-camera.x,this.y-camera.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

let player, bots=[], foods=[];

function startGame() {
  document.getElementById('menu').style.display='none';
  player = new Dog(WORLD_SIZE/2, WORLD_SIZE/2, document.getElementById('color').value, document.getElementById('name').value, true);
  bots=[];
  for(let i=0;i<BOT_COUNT;i++) spawnBot();
  foods=[];
  for(let i=0;i<FOOD_COUNT;i++) foods.push(new Food(Math.random()*WORLD_SIZE,Math.random()*WORLD_SIZE));
  gameLoop();
}

function spawnBot(){
  bots.push(new Dog(Math.random()*WORLD_SIZE,Math.random()*WORLD_SIZE, `hsl(${Math.random()*360},60%,40%)`,`Bot${Math.floor(Math.random()*1000)}`));
}

function eat(dog){
  foods.forEach((f,i)=>{
    if(Math.hypot(dog.x-f.x,dog.y-f.y) < dog.width() + 5){
      dog.length += f.value;
      foods[i]=new Food(Math.random()*WORLD_SIZE,Math.random()*WORLD_SIZE);
    }
  });
}

function dropFood(dog){
  for(let i=0; i<dog.segments.length; i+=2){
    foods.push(new Food(dog.segments[i].x, dog.segments[i].y, 4, 2));
  }
}

function checkDeath(dog, others){
  // Boundary Death
  if(dog.x < 0 || dog.x > WORLD_SIZE || dog.y < 0 || dog.y > WORLD_SIZE) return true;

  // Collision Death
  for(let other of others){
    for(let i=0; i<other.segments.length; i++){
      // Skip the head of the dog itself
      if(other === dog && i < 5) continue;
      if(Math.hypot(dog.x-other.segments[i].x, dog.y-other.segments[i].y) < other.width()/2 + 2) return true;
    }
  }
  return false;
}

function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let camera={x:player.x-canvas.width/2,y:player.y-canvas.height/2};

  // Boundary
  ctx.strokeStyle='red';
  ctx.lineWidth = 5;
  ctx.strokeRect(-camera.x,-camera.y,WORLD_SIZE,WORLD_SIZE);

  foods.forEach(f=>f.draw(camera));

  let allDogs = [player, ...bots];
  player.update(allDogs); 
  eat(player);

  bots.forEach(bot=>{ bot.update(allDogs); eat(bot); });

  if(checkDeath(player, bots)){
    alert("You hit a dog or the fence! Score: " + Math.floor(player.length));
    location.reload();
    return;
  }

  for(let i=bots.length-1; i>=0; i--){
    if(checkDeath(bots[i], [player, ...bots.filter((_,idx)=>idx!==i)])){
      dropFood(bots[i]);
      bots.splice(i,1);
    }
  }

  while(bots.length<BOT_COUNT) spawnBot();

  bots.forEach(bot=>bot.draw(camera));
  player.draw(camera);

  // Score
  ctx.fillStyle='white';
  ctx.font = "20px Arial";
  ctx.fillText("Length: "+Math.floor(player.length),20,canvas.height-20);

  requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
