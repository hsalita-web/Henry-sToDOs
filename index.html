<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wiener.io</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
    color: white;
    font-family: Arial;
  }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="ui">Wiener.io — Eat to grow. Avoid others.</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const FOOD_COUNT = 200;
const BOT_COUNT = 5;

let mouse = { x: canvas.width/2, y: canvas.height/2 };
document.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

class Dog {
  constructor(x,y,color,isPlayer=false) {
    this.x = x;
    this.y = y;
    this.segments = [];
    this.length = 20;
    this.angle = 0;
    this.speed = 2;
    this.color = color;
    this.isPlayer = isPlayer;
  }

  update() {
    if (this.isPlayer) {
      this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
    } else {
      this.angle += (Math.random()-0.5)*0.2;
    }

    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;

    this.segments.unshift({x:this.x,y:this.y});
    while (this.segments.length > this.length) this.segments.pop();
  }

  draw() {
    ctx.fillStyle = this.color;
    for (let i=0;i<this.segments.length;i++) {
      let s = this.segments[i];
      ctx.beginPath();
      ctx.arc(s.x, s.y, 6, 0, Math.PI*2);
      ctx.fill();
    }

    // head + eyes
    let head = this.segments[0];
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(head.x-3, head.y-2, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(head.x+3, head.y-2, 2, 0, Math.PI*2); ctx.fill();
  }
}

class Food {
  constructor() {
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
  }

  draw() {
    ctx.fillStyle = "lime";
    ctx.beginPath();
    ctx.arc(this.x,this.y,3,0,Math.PI*2);
    ctx.fill();
  }
}

let player = new Dog(canvas.width/2, canvas.height/2, "orange", true);
let bots = [];
let foods = [];

for (let i=0;i<BOT_COUNT;i++) {
  bots.push(new Dog(Math.random()*canvas.width, Math.random()*canvas.height, "hsl("+Math.random()*360+",100%,50%)"));
}

for (let i=0;i<FOOD_COUNT;i++) foods.push(new Food());

function checkCollisions(dog) {
  foods.forEach((f,i)=>{
    let dx = dog.x - f.x;
    let dy = dog.y - f.y;
    if (Math.hypot(dx,dy) < 10) {
      dog.length += 5;
      foods[i] = new Food();
    }
  });
}

function drawGrid() {
  ctx.strokeStyle = "#222";
  for (let x=0;x<canvas.width;x+=50) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
  }
  for (let y=0;y<canvas.height;y+=50) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
}

function gameLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawGrid();

  foods.forEach(f=>f.draw());

  player.update();
  checkCollisions(player);
  player.draw();

  bots.forEach(bot=>{
    bot.update();
    checkCollisions(bot);
    bot.draw();
  });

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
