<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wiener.io</title>
<style>
  body { margin:0; overflow:hidden; background:#111; color:white; font-family:Arial; }
  #menu {
    position:absolute; top:20px; left:20px; z-index:20;
    background:rgba(0,0,0,0.5); padding:10px; border-radius:10px;
  }
</style>
</head>
<body>
<div id="menu">
  Name: <input id="name" value="Player"><br>
  Color: <input type="color" id="color" value="#ff9900"><br>
  <button onclick="startGame()">Start</button>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const WORLD_SIZE = 3000;
const FOOD_COUNT = 300;
const BOT_COUNT = 10;

let mouseAngle = 0;
document.addEventListener('mousemove', e => {
  mouseAngle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
});

let boosting = false;
document.addEventListener('mousedown', ()=> boosting = true);
document.addEventListener('mouseup', ()=> boosting = false);

class Dog {
  constructor(x,y,color,name,isPlayer=false) {
    this.x = x;
    this.y = y;
    this.segments = [];
    this.length = 30;
    this.angle = 0;
    this.baseSpeed = 2;
    this.color = color;
    this.isPlayer = isPlayer;
    this.name = name;
  }

  update() {
    let speed = this.baseSpeed;

    if (this.isPlayer) {
      this.angle = mouseAngle;
      if (boosting && this.length > 20) {
        speed = 4;
        this.length -= 0.2;
      }
    } else {
      this.angle += (Math.random()-0.5)*0.3;
    }

    this.x += Math.cos(this.angle) * speed;
    this.y += Math.sin(this.angle) * speed;

    this.segments.unshift({x:this.x,y:this.y});
    while (this.segments.length > this.length) this.segments.pop();
  }

  draw(camera) {
    ctx.fillStyle = this.color;

    for (let s of this.segments) {
      ctx.beginPath();
      ctx.arc(s.x - camera.x, s.y - camera.y, 6, 0, Math.PI*2);
      ctx.fill();
    }

    let head = this.segments[0];
    if (!head) return;

    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.arc(head.x-camera.x-3, head.y-camera.y-2, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(head.x-camera.x+3, head.y-camera.y-2, 2, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle = "white";
    ctx.fillText(this.name, head.x-camera.x-10, head.y-camera.y-10);
  }
}

class Food {
  constructor() {
    this.x = Math.random()*WORLD_SIZE;
    this.y = Math.random()*WORLD_SIZE;
  }

  draw(camera) {
    ctx.fillStyle = "lime";
    ctx.beginPath();
    ctx.arc(this.x-camera.x,this.y-camera.y,3,0,Math.PI*2);
    ctx.fill();
  }
}

let player;
let bots = [];
let foods = [];

function startGame() {
  document.getElementById('menu').style.display = 'none';

  player = new Dog(WORLD_SIZE/2, WORLD_SIZE/2,
    document.getElementById('color').value,
    document.getElementById('name').value,
    true);

  bots = [];
  for (let i=0;i<BOT_COUNT;i++) {
    bots.push(new Dog(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE,
      "hsl("+Math.random()*360+",100%,50%)","Bot"+i));
  }

  foods = [];
  for (let i=0;i<FOOD_COUNT;i++) foods.push(new Food());

  gameLoop();
}

function eat(dog) {
  foods.forEach((f,i)=>{
    let dx = dog.x - f.x;
    let dy = dog.y - f.y;
    if (Math.hypot(dx,dy) < 10) {
      dog.length += 5;
      foods[i] = new Food();
    }
  });
}

function checkDeath(dog, others) {
  for (let other of others) {
    for (let seg of other.segments) {
      if (Math.hypot(dog.x-seg.x, dog.y-seg.y) < 6) {
        return true;
      }
    }
  }
  return false;
}

function gameLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let camera = {
    x: player.x - canvas.width/2,
    y: player.y - canvas.height/2
  };

  foods.forEach(f=>f.draw(camera));

  player.update();
  eat(player);

  bots.forEach(bot=>{
    bot.update();
    eat(bot);
  });

  // collisions
  if (checkDeath(player, bots)) {
    alert("You died!");
    location.reload();
  }

  bots = bots.filter(bot => !checkDeath(bot, [player]));

  // respawn bots
  while (bots.length < BOT_COUNT) {
    bots.push(new Dog(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE,
      "hsl("+Math.random()*360+",100%,50%)","Bot"+Math.floor(Math.random()*1000)));
  }

  player.draw(camera);
  bots.forEach(bot=>bot.draw(camera));

  requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
