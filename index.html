<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wiener.io</title>
    <style>
        body { margin:0; overflow:hidden; background:#0f172a; color:white; font-family: 'Segoe UI', Tahoma, sans-serif; }
        canvas { display:block; }
        
        #overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.85); z-index: 100;
        }
        
        .ui-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            min-width: 320px;
        }

        h1 { margin-top: 0; color: #ffcc00; font-size: 42px; text-shadow: 3px 3px 0px #8B4513; margin-bottom: 10px; }
        
        .input-group { margin: 15px 0; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 11px; font-weight: bold; text-transform: uppercase; opacity: 0.7; }
        
        input[type="text"], select {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); 
            background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; outline: none;
        }

        input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 10px; background: none; cursor: pointer; }

        button {
            width: 100%; padding: 16px; border-radius: 10px; border: none;
            background: #ffcc00; color: #0f172a; font-weight: 800; font-size: 18px;
            cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        button:hover { background: #ffe066; transform: scale(1.02); }

        #stats-summary { display: none; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .stat-val { font-size: 24px; color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="ui-card">
        <div id="stats-summary">
            <h2 style="margin:0; color:#ff4444;">Wieners Wasted!</h2>
            <p>Kills: <span id="final-kills" class="stat-val">0</span> | Max Length: <span id="final-score" class="stat-val">0</span></p>
        </div>
        <h1>Wiener.io</h1>
        <div class="input-group">
            <label>Dachshund Name</label>
            <input type="text" id="name" value="LongBoi">
        </div>
        <div class="input-group">
            <label>Difficulty</label>
            <select id="difficulty">
                <option value="easy">Easy (Puppy)</option>
                <option value="hard" selected>Hard (Hot Dog)</option>
                <option value="difficult">Difficult (Alpha Hound)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Coat Color</label>
            <input type="color" id="color" value="#8B4513">
        </div>
        <button onclick="startGame()">UNLEASH THE HOUND</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

const WORLD_SIZE = 3000; 
const FOOD_COUNT = 400;
const BOT_COUNT = 15;
const DROP_EXPIRY = 15000; 
const FUNNY_NAMES = ["Bark_Twain", "Oscar_Mayer", "Frank_Furter", "Sausage_Slayer", "Glizzy_God", "Mustard_Mane", "Wiener_Winner", "Link_Lover", "Bun_Burner", "Sub_Woofer"];

let player, bots=[], foods=[], gameActive = false, kills = 0, mouseAngle = 0, diffSetting = 'hard';

document.addEventListener('mousemove', e => {
    mouseAngle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
});

let playerBoosting = false;
document.addEventListener('mousedown', () => playerBoosting = true);
document.addEventListener('mouseup', () => playerBoosting = false);

class Dog {
    constructor(x, y, color, name, isPlayer = false) {
        this.x = x; this.y = y;
        this.segments = [];
        this.length = 35;
        this.angle = Math.random() * Math.PI * 2;
        this.color = color;
        this.name = name;
        this.isPlayer = isPlayer;
        this.isBoosting = false;
        for(let i=0; i<8; i++) this.segments.push({x:x, y:y});
    }

    width() { return 10 + this.length * 0.012; }

    update(allDogs) {
        let speed = 2.5;
        this.isBoosting = false;

        if (this.isPlayer) {
            this.angle = mouseAngle;
            if (playerBoosting && this.length > 20) { speed = 4.8; this.isBoosting = true; }
        } else {
            // Optimized AI
            let avoidX = 0, avoidY = 0, danger = false;
            const margin = 150;
            if(this.x < margin) avoidX += 1; else if(this.x > WORLD_SIZE-margin) avoidX -= 1;
            if(this.y < margin) avoidY += 1; else if(this.y > WORLD_SIZE-margin) avoidY -= 1;

            let senseDist = diffSetting === 'easy' ? 70 : (diffSetting === 'hard' ? 140 : 220);
            
            // Only check nearby dogs for performance
            for(let d of allDogs) {
                if (d === this) continue;
                let dx = this.x - d.x;
                let dy = this.y - d.y;
                let distSq = dx*dx + dy*dy;
                if (distSq < senseDist * senseDist) {
                    avoidX += dx; avoidY += dy;
                    danger = true;
                }
            }

            if (danger || avoidX !== 0 || avoidY !== 0) {
                let targetAngle = Math.atan2(avoidY, avoidX);
                let diff = targetAngle - this.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                let turnSpeed = diffSetting === 'easy' ? 0.05 : (diffSetting === 'hard' ? 0.12 : 0.2);
                this.angle += diff * turnSpeed;
                if(danger && diffSetting !== 'easy' && this.length > 30) { speed = 4.5; this.isBoosting = true; }
            } else {
                this.angle += (Math.random() - 0.5) * 0.1;
            }
        }

        if (this.isBoosting) {
            this.length -= 0.12;
            if (Math.random() > 0.8) foods.push(new Food(this.segments[this.segments.length-1].x, this.segments[this.segments.length-1].y, 3, 0.8, true));
        }

        this.x += Math.cos(this.angle) * speed;
        this.y += Math.sin(this.angle) * speed;
        this.segments.unshift({x: this.x, y: this.y});
        if (this.segments.length > this.length) this.segments.pop();
    }

    draw(camera) {
        let w = this.width();
        ctx.strokeStyle = this.color;
        ctx.lineWidth = w;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let s of this.segments) ctx.lineTo(s.x - camera.x, s.y - camera.y);
        ctx.stroke();

        let h = this.segments[0];
        let hx = h.x - camera.x, hy = h.y - camera.y;

        ctx.save();
        ctx.translate(hx, hy);
        ctx.rotate(this.angle);
        ctx.fillStyle = this.color;
        // Head/Snout
        ctx.beginPath(); ctx.ellipse(w*0.5, 0, w*0.7, w*0.45, 0, 0, Math.PI*2); ctx.fill();
        // Ears
        ctx.beginPath(); ctx.ellipse(0, -w*0.6, w*0.5, w*0.3, Math.PI/3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(0, w*0.6, w*0.5, w*0.3, -Math.PI/3, 0, Math.PI*2); ctx.fill();
        // Nose
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(w*1.1, 0, w*0.15, 0, Math.PI*2); ctx.fill();
        // Eyes: White circles + small black pupils
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(w*0.3, -w*0.3, w*0.22, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(w*0.3, w*0.3, w*0.22, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "black";
        ctx.beginPath(); ctx.arc(w*0.32, -w*0.3, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(w*0.32, w*0.3, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        ctx.fillStyle = "white"; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(this.name, hx, hy - w - 10);
    }
}

class Food {
    constructor(x, y, size=4, val=2, drop=false) {
        this.x=x; this.y=y; this.size=size; this.val=val; this.drop=drop;
        this.time = Date.now();
        this.color = drop ? "#ffcc00" : `hsl(${Math.random()*360},70%,60%)`;
    }
    draw(camera) {
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x-camera.x, this.y-camera.y, this.size, 0, Math.PI*2); ctx.fill();
    }
}

player = new Dog(WORLD_SIZE/2, WORLD_SIZE/2, "#8B4513", "...", false);
for(let i=0; i<FOOD_COUNT; i++) foods.push(new Food(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE));
for(let i=0; i<BOT_COUNT; i++) spawnBot();

function spawnBot() {
    let colors = ['#e67e22', '#e74c3c', '#9b59b6', '#3498db', '#2ecc71', '#f1c40f'];
    bots.push(new Dog(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, colors[Math.floor(Math.random()*colors.length)], FUNNY_NAMES[Math.floor(Math.random()*FUNNY_NAMES.length)]));
}

function startGame() {
    kills = 0; diffSetting = document.getElementById('difficulty').value;
    player = new Dog(WORLD_SIZE/2, WORLD_SIZE/2, document.getElementById('color').value, document.getElementById('name').value, true);
    document.getElementById('overlay').style.display = 'none';
    gameActive = true;
}

function checkCollision(dog, others) {
    for (let o of others) {
        for (let i=0; i<o.segments.length; i++) {
            if (i < 10 && o === dog) continue;
            let s = o.segments[i];
            let dx = dog.x - s.x, dy = dog.y - s.y;
            if (dx*dx + dy*dy < (o.width()/2 + 3)**2) return true;
        }
    }
    return false;
}

function loop() {
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,canvas.width,canvas.height);
    let camera = { x: player.x - canvas.width/2, y: player.y - canvas.height/2 };
    ctx.strokeStyle = '#334155'; ctx.lineWidth = 10; ctx.strokeRect(-camera.x, -camera.y, WORLD_SIZE, WORLD_SIZE);

    let all = [player, ...bots];
    player.update(all);
    bots.forEach(b => b.update(all));

    all.forEach(d => {
        for (let i = foods.length-1; i>=0; i--) {
            let f = foods[i];
            let dx = d.x - f.x, dy = d.y - f.y;
            if (dx*dx + dy*dy < (d.width()+6)**2) {
                d.length += f.val;
                if (f.drop) foods.splice(i,1);
                else { f.x = Math.random()*WORLD_SIZE; f.y = Math.random()*WORLD_SIZE; }
            }
        }
    });

    if (gameActive) {
        if (player.x<0 || player.x>WORLD_SIZE || player.y<0 || player.y>WORLD_SIZE || checkCollision(player, bots)) {
            gameActive = false;
            document.getElementById('final-kills').innerText = kills;
            document.getElementById('final-score').innerText = Math.floor(player.length);
            document.getElementById('stats-summary').style.display = 'block';
            document.getElementById('overlay').style.display = 'flex';
        }
        for (let i = bots.length-1; i>=0; i--) {
            if (bots[i].x<0 || bots[i].x>WORLD_SIZE || bots[i].y<0 || bots[i].y>WORLD_SIZE || checkCollision(bots[i], [player, ...bots.filter((_,j)=>j!==i)])) {
                if (Math.hypot(bots[i].x-player.x, bots[i].y-player.y) < 300) kills++;
                for(let j=0; j<bots[i].segments.length; j+=4) foods.push(new Food(bots[i].segments[j].x, bots[i].segments[j].y, 5, 3, true));
                bots.splice(i,1); spawnBot();
            }
        }
    }

    foods.forEach(f => f.draw(camera));
    bots.forEach(b => b.draw(camera));
    if (gameActive) player.draw(camera);

    if (gameActive) {
        ctx.fillStyle = "white"; ctx.font = "bold 18px sans-serif";
        ctx.fillText(`Kills: ${kills} | Length: ${Math.floor(player.length)}`, 20, canvas.height - 20);
        // Minimap
        const ms = 140, mx = canvas.width - 160, my = canvas.height - 160;
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(mx, my, ms, ms);
        bots.forEach(b => { ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fillRect(mx + (b.x/WORLD_SIZE)*ms, my + (b.y/WORLD_SIZE)*ms, 2, 2); });
        ctx.fillStyle = "#ffcc00"; ctx.beginPath(); ctx.arc(mx+(player.x/WORLD_SIZE)*ms, my+(player.y/WORLD_SIZE)*ms, 3, 0, Math.PI*2); ctx.fill();
    }
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
