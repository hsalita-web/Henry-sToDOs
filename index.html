<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weekly To-Do + Wiener Progress</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      margin-bottom: 20px;
    }

    .container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #ff7a18;
      color: white;
      font-weight: bold;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
      max-height: 200px;
      overflow-y: auto;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.2);
      padding: 10px;
      border-radius: 8px;
    }

    .dog-container {
      margin-top: 40px;
      width: 80%;
      text-align: center;
    }

    .dog {
      height: 60px;
      background: #8b4513;
      border-radius: 30px;
      position: relative;
      transition: width 0.5s ease;
      margin: 0 auto;
    }

    /* Head */
    .dog::before {
      content: '';
      position: absolute;
      left: -60px;
      top: 5px;
      width: 60px;
      height: 50px;
      background: #8b4513;
      border-radius: 50%;
    }

    /* Tail */
    .dog::after {
      content: '';
      position: absolute;
      right: -15px;
      top: 20px;
      width: 15px;
      height: 15px;
      background: #8b4513;
      border-radius: 50%;
    }

    /* Eyes */
    .eye {
      position: absolute;
      width: 8px;
      height: 8px;
      background: black;
      border-radius: 50%;
      top: 20px;
      left: -35px;
    }

    .eye.right {
      left: -20px;
    }

    .percentage {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Weekly To-Do</h1>

  <div class="container">
    <input type="text" id="taskInput" placeholder="Add a task...">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
  </div>

  <div class="dog-container">
    <div id="dog" class="dog" style="width: 50px;">
      <div class="eye"></div>
      <div class="eye right"></div>
    </div>
    <div id="percentage" class="percentage">0% Complete</div>
  </div>

  <script>
    const taskList = document.getElementById('taskList');
    const dog = document.getElementById('dog');
    const percentageText = document.getElementById('percentage');

    function addTask() {
      const input = document.getElementById('taskInput');
      const taskText = input.value.trim();

      if (taskText === '') return;

      const li = document.createElement('li');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.onchange = updateProgress;

      const span = document.createElement('span');
      span.textContent = taskText;

      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = '✕';
      deleteBtn.onclick = () => {
        li.remove();
        updateProgress();
      };

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(deleteBtn);

      taskList.appendChild(li);

      input.value = '';
      updateProgress();
    }

    function updateProgress() {
      const tasks = taskList.querySelectorAll('li');
      const total = tasks.length;

      if (total === 0) {
        dog.style.width = '50px';
        percentageText.textContent = '0% Complete';
        return;
      }

      let completed = 0;

      tasks.forEach(task => {
        if (task.querySelector('input').checked) completed++;
      });

      const percent = Math.round((completed / total) * 100);

      const width = 50 + (percent / 100) * 500;
      dog.style.width = width + 'px';

      percentageText.textContent = percent + '% Complete';
    }
  </script>

</body>
</html>
