<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wiener.io</title>
<style>
  body { margin:0; overflow:hidden; background:#0f172a; color:white; font-family:Arial; }
  canvas { display:block; }
  #menu { position:absolute; top:20px; left:20px; z-index:20; background:rgba(0,0,0,0.6); padding:10px; border-radius:10px; }
</style>
</head>
<body>
<div id="menu">
  Name: <input id="name" value="Dachshund"><br>
  Color: <input type="color" id="color" value="#8B4513"><br>
  <button onclick="startGame()">Start</button>
</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CONFIGURATION ---
const WORLD_SIZE = 4000; 
const FOOD_COUNT = 600;
const BOT_COUNT = 15;
const DROP_EXPIRY_MS = 15000; 

let mouseAngle = 0;
document.addEventListener('mousemove', e => {
  mouseAngle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
});

let playerBoosting = false;
document.addEventListener('mousedown', ()=> playerBoosting = true);
document.addEventListener('mouseup', ()=> playerBoosting = false);

class Dog {
  constructor(x,y,color,name,isPlayer=false) {
    this.x = x; this.y = y;
    this.segments = [];
    this.length = 40;
    this.angle = Math.random() * Math.PI * 2;
    this.baseSpeed = 1.8; // Slower base speed as requested
    this.color = color;
    this.name = name;
    this.isPlayer = isPlayer;
    this.isBoosting = false;
  }

  width() { return 8 + this.length * 0.02; }

  update(allDogs) {
    let speed = this.baseSpeed;
    this.isBoosting = false;

    if (this.isPlayer) {
      this.angle = mouseAngle;
      if (playerBoosting && this.length > 20) {
        speed = 4;
        this.isBoosting = true;
      }
    } else {
      // --- SMART BOT AI ---
      let target = null;
      let minDist = 800;
      let dangerFound = false;

      // 1. Avoidance Logic (Don't die)
      for (let other of allDogs) {
        for (let i = 0; i < other.segments.length; i++) {
          if (other === this && i < 10) continue; // Don't avoid own head
          let seg = other.segments[i];
          let dist = Math.hypot(this.x - seg.x, this.y - seg.y);
          
          if (dist < 60) { // Danger zone
            let angleToDanger = Math.atan2(seg.y - this.y, seg.x - this.x);
            // Turn away from danger
            this.angle -= (angleToDanger - this.angle) * 0.2;
            dangerFound = true;
            break;
          }
        }
        if (dangerFound) break;
      }

      // 2. Predatory Logic (Try to kill)
      if (!dangerFound) {
        allDogs.forEach(d => {
          if (d !== this) {
            let dist = Math.hypot(this.x - d.x, this.y - d.y);
            if (dist < minDist) { minDist = dist; target = d; }
          }
        });

        if (target) {
          // Aim slightly ahead of target head to cut them off
          let targetAngle = Math.atan2(target.y - this.y, target.x - this.x);
          let diff = targetAngle - this.angle;
          while (diff < -Math.PI) diff += Math.PI * 2;
          while (diff > Math.PI) diff -= Math.PI * 2;
          this.angle += diff * 0.08; 

          // Boost if close and length allows
          if (minDist < 300 && this.length > 30) {
            speed = 4;
            this.isBoosting = true;
          }
        } else {
          this.angle += (Math.random()-0.5)*0.05;
        }
      }
    }

    // Handle Boosting Cost and Pellet Dropping
    if (this.isBoosting) {
      this.length -= 0.15;
      // Drop small pellets while boosting
      if (Math.random() > 0.8) {
        let lastSeg = this.segments[this.segments.length - 1] || this;
        foods.push(new Food(lastSeg.x, lastSeg.y, 3, 0.8, true));
      }
    }

    this.x += Math.cos(this.angle) * speed;
    this.y += Math.sin(this.angle) * speed;

    this.segments.unshift({x:this.x,y:this.y});
    while (this.segments.length > this.length) this.segments.pop();
  }

  draw(camera) {
    let w = this.width();
    ctx.strokeStyle = this.color;
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    ctx.beginPath();
    for (let i=0;i<this.segments.length;i++) {
      let s = this.segments[i];
      let x = s.x - camera.x;
      let y = s.y - camera.y;
      if (i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.stroke();

    let head = this.segments[0];
    if (!head) return;

    let hx = head.x - camera.x;
    let hy = head.y - camera.y;

    ctx.save();
    ctx.translate(hx, hy);
    ctx.rotate(this.angle);
    ctx.fillStyle = this.color;
    // Snout
    ctx.beginPath(); ctx.ellipse(w*0.7, 0, w*0.8, w*0.5, 0, 0, Math.PI*2); ctx.fill();
    // Nose
    ctx.fillStyle = "black";
    ctx.beginPath(); ctx.arc(w*1.4, 0, 2.5, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.arc(2, -w/3, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, w/3, 2.5, 0, Math.PI*2); ctx.fill();
    // Ears
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath(); ctx.ellipse(0, -w/1.5, w/1.8, w/3, Math.PI/4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, w/1.5, w/1.8, w/3, -Math.PI/4, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    ctx.fillStyle = "white";
    ctx.font = "bold 11px Arial";
    ctx.fillText(this.name, hx-15, hy - (w + 10));
  }
}

class Food {
  constructor(x,y,size=3,value=1.5, isDrop=false) {
    this.x=x; this.y=y; this.size=size; this.value=value;
    this.isDrop = isDrop;
    this.spawnTime = Date.now();
  }
  draw(camera) {
    ctx.fillStyle = this.isDrop ? "rgba(255, 215, 0, 0.9)" : "rgba(144, 238, 144, 0.7)";
    ctx.beginPath();
    ctx.arc(this.x-camera.x,this.y-camera.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

let player, bots=[], foods=[];

function startGame() {
  document.getElementById('menu').style.display='none';
  player = new Dog(WORLD_SIZE/2, WORLD_SIZE/2, document.getElementById('color').value, document.getElementById('name').value, true);
  bots=[];
  for(let i=0;i<BOT_COUNT;i++) spawnBot();
  foods=[];
  for(let i=0;i<FOOD_COUNT;i++) foods.push(new Food(Math.random()*WORLD_SIZE,Math.random()*WORLD_SIZE));
  gameLoop();
}

function spawnBot(){
  bots.push(new Dog(Math.random()*WORLD_SIZE,Math.random()*WORLD_SIZE, `hsl(${Math.random()*360},60%,50%)`,`Bot${Math.floor(Math.random()*1000)}`));
}

function eat(dog){
  for (let i = foods.length - 1; i >= 0; i--) {
    let f = foods[i];
    if(Math.hypot(dog.x-f.x, dog.y-f.y) < dog.width() + 5){
      dog.length += f.value;
      if (f.isDrop) foods.splice(i, 1);
      else foods[i] = new Food(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE);
    }
  }
}

function dropFood(dog){
  for(let i=0; i<dog.segments.length; i+=3){
    foods.push(new Food(dog.segments[i].x, dog.segments[i].y, 5, 2.5, true));
  }
}

function checkDeath(dog, others){
  if(dog.x < 0 || dog.x > WORLD_SIZE || dog.y < 0 || dog.y > WORLD_SIZE) return true;
  for(let other of others){
    for(let i=0; i<other.segments.length; i++){
      if(other === dog && i < 10) continue;
      if(Math.hypot(dog.x-other.segments[i].x, dog.y-other.segments[i].y) < other.width()/2 + 2) return true;
    }
  }
  return false;
}

function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let camera={x:player.x-canvas.width/2,y:player.y-canvas.height/2};

  // Border
  ctx.strokeStyle='red';
  ctx.lineWidth = 10;
  ctx.strokeRect(-camera.x,-camera.y,WORLD_SIZE,WORLD_SIZE);

  // Expire drops
  let now = Date.now();
  foods = foods.filter(f => !f.isDrop || (now - f.spawnTime < DROP_EXPIRY_MS));

  foods.forEach(f=>f.draw(camera));

  let allDogs = [player, ...bots];
  player.update(allDogs); 
  eat(player);

  bots.forEach(bot=>{ bot.update(allDogs); eat(bot); });

  if(checkDeath(player, bots)){
    alert("Game Over! Final Length: " + Math.floor(player.length));
    location.reload();
    return;
  }

  for(let i=bots.length-1; i>=0; i--){
    if(checkDeath(bots[i], [player, ...bots.filter((_,idx)=>idx!==i)])){
      dropFood(bots[i]);
      bots.splice(i,1);
    }
  }

  while(bots.length < BOT_COUNT) spawnBot();

  bots.forEach(bot=>bot.draw(camera));
  player.draw(camera);

  // Leaderboard UI
  let sorted = [...allDogs].sort((a,b)=>b.length-a.length);
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.fillRect(canvas.width-180, 10, 170, 150);
  ctx.fillStyle='white';
  ctx.font = "bold 14px Arial";
  ctx.fillText("LEADERBOARD", canvas.width-170, 30);
  ctx.font = "12px Arial";
  for(let i=0; i<8; i++) {
    if(sorted[i]) {
      let nameText = `${i+1}. ${sorted[i].name.substring(0,10)}`;
      let scoreText = Math.floor(sorted[i].length);
      ctx.fillText(nameText, canvas.width-170, 55 + i*15);
      ctx.fillText(scoreText, canvas.width-40, 55 + i*15);
    }
  }

  ctx.font = "20px Arial";
  ctx.fillText("Length: "+Math.floor(player.length), 20, canvas.height-20);

  requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
