<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wiener.io - Juiced & Fixed</title>
    <style>
        body { margin:0; overflow:hidden; background:#0f172a; color:white; font-family: 'Segoe UI', sans-serif; }
        canvas { display:block; }
        #overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.9); z-index: 100;
        }
        .ui-card {
            background: #1e293b; padding: 40px; border-radius: 30px; 
            text-align: center; border: 2px solid #ffcc00; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        h1 { color: #ffcc00; font-size: 48px; margin: 0 0 20px 0; text-shadow: 3px 3px 0 #8B4513; }
        input { display:block; margin: 0 auto 20px; padding:12px; border-radius:10px; border:none; width:220px; text-align:center; font-size:16px; }
        button { 
            padding: 15px 40px; font-size: 20px; font-weight: bold; 
            background: #ffcc00; border: none; border-radius: 15px; cursor: pointer; color: #1e293b;
        }
        button:hover { background: #ffe066; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="overlay">
    <div class="ui-card">
        <h1 id="title-text">Wiener.io</h1>
        <div id="death-stats" style="display:none; margin-bottom:20px;">
            <h2 style="color:#ff4444; margin:0;">WASTED!</h2>
            <p style="font-size:20px;">Kills: <span id="final-kills" style="color:#ffcc00;">0</span> | Length: <span id="final-score" style="color:#ffcc00;">0</span></p>
        </div>
        <input type="text" id="name" value="LongBoi">
        <button onclick="startGame()">UNLEASH THE HOUND</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

const WORLD_SIZE = 5000;
const BOT_COUNT = 15;
const FOOD_COUNT = 400;

let player = null, bots=[], foods=[], particles=[], gameActive = false, kills = 0, mouseAngle = 0;
let sugarRushActive = 0;

document.addEventListener('mousemove', e => {
    mouseAngle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
});

let playerBoosting = false;
document.addEventListener('mousedown', () => playerBoosting = true);
document.addEventListener('mouseup', () => playerBoosting = false);

class Particle {
    constructor(x, y, color, speed, size, life) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random()-0.5) * speed;
        this.vy = (Math.random()-0.5) * speed;
        this.size = size; this.life = life; this.maxLife = life;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life--; }
    draw(cam) {
        ctx.save();
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x - cam.x, this.y - cam.y, this.size, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class Dog {
    constructor(x, y, color, name, isPlayer = false, startLen = 40) {
        this.x = x; this.y = y; this.segments = [];
        this.length = startLen; this.color = color; this.name = name;
        this.isPlayer = isPlayer; this.angle = Math.random() * Math.PI*2;
        this.isBoosting = false;
        for(let i=0; i<this.length; i++) this.segments.push({x:x, y:y});
    }

    width() { return 12 + this.length * 0.005; }

    update(allDogs, allFoods) {
        let speed = 3.8;
        this.isBoosting = false;

        if (this.isPlayer) {
            this.angle = mouseAngle;
            if ((playerBoosting && this.length > 30) || sugarRushActive > 0) {
                speed = sugarRushActive > 0 ? 7.5 : 6.0;
                this.isBoosting = true;
            }
        } else {
            let distToPlayer = Math.hypot(this.x - player.x, this.y - player.y);
            let targetFood = allFoods.find(f => f.special || (f.drop && Math.hypot(this.x-f.x, this.y-f.y) < 400));
            
            if (targetFood) {
                let fAngle = Math.atan2(targetFood.y - this.y, targetFood.x - this.x);
                let diff = fAngle - this.angle;
                while(diff < -Math.PI) diff += Math.PI*2; while(diff > Math.PI) diff -= Math.PI*2;
                this.angle += diff * 0.1;
                speed = 5.8; this.isBoosting = true;
            } else if (distToPlayer < 600) {
                let pAngle = Math.atan2(player.y - this.y, player.x - this.x);
                let diff = pAngle - this.angle;
                while(diff < -Math.PI) diff += Math.PI*2; while(diff > Math.PI) diff -= Math.PI*2;
                this.angle += diff * 0.05;
            }
        }

        if (this.isBoosting && Math.random() > 0.7) {
            particles.push(new Particle(this.x, this.y, "rgba(255,255,255,0.2)", 1, 2, 15));
        }

        this.x += Math.cos(this.angle) * speed;
        this.y += Math.sin(this.angle) * speed;
        this.segments.unshift({x: this.x, y: this.y});
        while (this.segments.length > this.length) this.segments.pop();

        if (this.isBoosting) {
            if (!this.isPlayer) this.length -= 0.05;
            else if (sugarRushActive <= 0) this.length -= 0.08;
        }
    }

    draw(cam) {
        let w = this.width();
        ctx.strokeStyle = (this.isPlayer && sugarRushActive > 0) ? `hsl(${Date.now()%360}, 80%, 60%)` : this.color;
        ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let s of this.segments) ctx.lineTo(s.x - cam.x, s.y - cam.y);
        ctx.stroke();

        let h = this.segments[0];
        let hx = h.x - cam.x, hy = h.y - cam.y;
        ctx.save();
        ctx.translate(hx, hy); ctx.rotate(this.angle);
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.ellipse(w*0.5, 0, w*0.75, w*0.48, 0, 0, Math.PI*2); ctx.fill();
        
        if (this.length > 150) { // Shades
            ctx.fillStyle = "#111"; ctx.fillRect(w*0.3, -w*0.4, w*0.3, w*0.8);
        }
        if (this.length > 300) { // Crown
            ctx.fillStyle = "#ffd700"; ctx.beginPath();
            ctx.moveTo(0, -w*0.5); ctx.lineTo(w*0.2, -w*0.8); ctx.lineTo(w*0.4, -w*0.5);
            ctx.lineTo(w*0.6, -w*0.8); ctx.lineTo(w*0.8, -w*0.5); ctx.fill();
        }
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(w*0.3, -w*0.25, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(w*0.3, w*0.25, 3, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class Food {
    constructor(x, y, special = false) {
        this.x = x; this.y = y; this.special = special;
        this.drop = false; this.val = special ? 30 : 2;
        this.size = special ? 10 : 4;
        this.color = special ? "#ffd700" : `hsl(${Math.random()*360}, 70%, 60%)`;
    }
    draw(cam) {
        if (this.special) { ctx.shadowBlur = 15; ctx.shadowColor = "gold"; }
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x - cam.x, this.y - cam.y, this.size, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }
}

function spawnBot() {
    let colors = ['#e67e22', '#e74c3c', '#9b59b6', '#3498db', '#2ecc71'];
    bots.push(new Dog(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, colors[Math.floor(Math.random()*colors.length)], "Bot", false, 40 + Math.random()*100));
}

function explode(x, y, color) {
    for(let i=0; i<25; i++) particles.push(new Particle(x, y, color, 6, 4, 40));
}

function startGame() {
    kills = 0; sugarRushActive = 0; foods = []; bots = []; particles = [];
    player = new Dog(WORLD_SIZE/2, WORLD_SIZE/2, "#8B4513", document.getElementById('name').value, true);
    for(let i=0; i<FOOD_COUNT; i++) foods.push(new Food(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE));
    for(let i=0; i<BOT_COUNT; i++) spawnBot();
    document.getElementById('overlay').style.display = 'none';
    gameActive = true;
}

function loop() {
    if (!player) { requestAnimationFrame(loop); return; }
    
    ctx.fillStyle = "#0f172a"; ctx.fillRect(0,0,canvas.width,canvas.height);
    let cam = { x: player.x - canvas.width/2, y: player.y - canvas.height/2 };

    if (sugarRushActive > 0) sugarRushActive--;

    // Particles
    particles.forEach((p, i) => { p.update(); p.draw(cam); if(p.life <= 0) particles.splice(i,1); });

    // Food
    if (Math.random() < 0.003) foods.push(new Food(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, true));
    foods.forEach(f => f.draw(cam));

    // Update Player & Bots
    let all = [player, ...bots];
    all.forEach(d => { d.update(all, foods); d.draw(cam); });

    // Eating
    for(let i=foods.length-1; i>=0; i--) {
        let f = foods[i];
        all.forEach(d => {
            if(Math.hypot(d.x-f.x, d.y-f.y) < d.width() + 5) {
                d.length += f.val * 0.5;
                if(f.special && d.isPlayer) sugarRushActive = 300;
                foods.splice(i,1);
                if(!f.drop && !f.special) foods.push(new Food(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE));
            }
        });
    }

    // Collisions
    if(gameActive) {
        // Boundary check
        if(player.x<0 || player.x>WORLD_SIZE || player.y<0 || player.y>WORLD_SIZE) playerHit();
        
        bots.forEach((b, bi) => {
            let hit = false;
            if(b.x<0 || b.x>WORLD_SIZE || b.y<0 || b.y>WORLD_SIZE) hit = true;
            
            // Check if Bot hits Player or other Bots
            [player, ...bots].forEach(other => {
                if(b === other) return;
                for(let j=0; j<other.segments.length; j+=10) {
                    if(Math.hypot(b.x-other.segments[j].x, b.y-other.segments[j].y) < other.width()/2 + 5) hit = true;
                }
            });

            if(hit) {
                explode(b.x, b.y, b.color);
                if(Math.hypot(b.x-player.x, b.y-player.y) < 600) kills++;
                for(let j=0; j<b.segments.length; j+=8) {
                    let f = new Food(b.segments[j].x, b.segments[j].y); f.drop = true; f.val = 4; foods.push(f);
                }
                bots.splice(bi, 1); spawnBot();
            }
        });

        // Check if Player hits Bots
        bots.forEach(b => {
            for(let j=0; j<b.segments.length; j+=10) {
                if(Math.hypot(player.x-b.segments[j].x, player.y-b.segments[j].y) < b.width()/2 + 5) playerHit();
            }
        });
    }

    function playerHit() {
        if(!gameActive) return;
        gameActive = false;
        explode(player.x, player.y, player.color);
        setTimeout(() => {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('death-stats').style.display = 'block';
            document.getElementById('final-kills').innerText = kills;
            document.getElementById('final-score').innerText = Math.floor(player.length);
        }, 500);
    }

    // UI
    if(gameActive) {
        ctx.fillStyle = "white"; ctx.font = "bold 20px sans-serif";
        ctx.fillText(`Kills: ${kills} | Length: ${Math.floor(player.length)}`, 25, 45);
        if(sugarRushActive > 0) { ctx.fillStyle = "gold"; ctx.fillText("SUGAR RUSH!!", 25, 75); }
    }

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
