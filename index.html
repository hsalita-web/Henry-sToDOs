<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wiener.io</title>
    <style>
        body { margin:0; overflow:hidden; background:#0f172a; color:white; font-family: 'Segoe UI', Tahoma, sans-serif; }
        canvas { display:block; }
        
        #overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.8); z-index: 100;
        }
        
        .ui-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            min-width: 320px;
        }

        h1 { margin-top: 0; color: #ffcc00; font-size: 48px; text-shadow: 3px 3px 0px #8B4513; margin-bottom: 10px; }
        
        .input-group { margin: 20px 0; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
        
        input[type="text"] {
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); 
            background: rgba(0,0,0,0.3); color: white; font-size: 16px; box-sizing: border-box; outline: none;
        }

        input[type="color"] {
            width: 100%; height: 45px; border: none; border-radius: 10px; background: none; cursor: pointer;
        }

        button {
            width: 100%; padding: 18px; border-radius: 10px; border: none;
            background: #ffcc00; color: #0f172a; font-weight: 800; font-size: 18px;
            cursor: pointer; transition: all 0.2s; margin-top: 15px;
        }
        button:hover { background: #ffe066; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,204,0,0.3); }

        #stats-summary { display: none; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .stat-val { font-size: 28px; color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="ui-card">
        <div id="stats-summary">
            <h2 style="margin:0; color:#ff4444;">Wieners Wasted!</h2>
            <p>Kills: <span id="final-kills" class="stat-val">0</span></p>
            <p>Max Length: <span id="final-score" class="stat-val">0</span></p>
        </div>
        
        <h1>Wiener.io</h1>
        
        <div class="input-group">
            <label>Dachshund Name</label>
            <input type="text" id="name" placeholder="Name your hound..." value="LongBoi">
        </div>
        
        <div class="input-group">
            <label>Coat Color</label>
            <input type="color" id="color" value="#8B4513">
        </div>
        
        <button onclick="startGame()">UNLEASH THE HOUND</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const WORLD_SIZE = 3500; 
const FOOD_COUNT = 500;
const BOT_COUNT = 18;
const DROP_EXPIRY_MS = 15000; 

let player, bots=[], foods=[], gameActive = false;
let kills = 0;
let mouseAngle = 0;

document.addEventListener('mousemove', e => {
    mouseAngle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
});

let playerBoosting = false;
document.addEventListener('mousedown', () => playerBoosting = true);
document.addEventListener('mouseup', () => playerBoosting = false);

class Dog {
    constructor(x, y, color, name, isPlayer = false) {
        this.x = x; this.y = y;
        this.segments = [];
        this.length = 35;
        this.angle = Math.random() * Math.PI * 2;
        this.baseSpeed = 2.2; 
        this.color = color;
        this.name = name;
        this.isPlayer = isPlayer;
        this.isBoosting = false;
        // Initialize with a few segments to prevent instant death
        for(let i=0; i<5; i++) this.segments.push({x:x, y:y});
    }

    width() { return 10 + this.length * 0.015; }

    update(allDogs) {
        let speed = this.baseSpeed;
        this.isBoosting = false;

        if (this.isPlayer) {
            this.angle = mouseAngle;
            if (playerBoosting && this.length > 20) {
                speed = 4.5; 
                this.isBoosting = true;
            }
        } else {
            // Simple Bot AI: Avoid others and stay in bounds
            let avoidX = 0, avoidY = 0, danger = false;
            
            // Stay away from walls
            if(this.x < 100) avoidX += 1; if(this.x > WORLD_SIZE-100) avoidX -= 1;
            if(this.y < 100) avoidY += 1; if(this.y > WORLD_SIZE-100) avoidY -= 1;

            allDogs.forEach(d => {
                if (d === this) return;
                let dist = Math.hypot(this.x - d.x, this.y - d.y);
                if (dist < 150) {
                    avoidX += (this.x - d.x) / dist;
                    avoidY += (this.y - d.y) / dist;
                    danger = true;
                }
            });

            if (danger || avoidX !== 0) {
                let targetAngle = Math.atan2(avoidY, avoidX);
                let diff = targetAngle - this.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                this.angle += diff * 0.1;
                if(danger && this.length > 30) { speed = 4; this.isBoosting = true; }
            } else {
                this.angle += (Math.random() - 0.5) * 0.1;
            }
        }

        if (this.isBoosting) {
            this.length -= 0.15;
            if (Math.random() > 0.8) {
                let tail = this.segments[this.segments.length-1];
                foods.push(new Food(tail.x, tail.y, 3, 0.8, true));
            }
        }

        this.x += Math.cos(this.angle) * speed;
        this.y += Math.sin(this.angle) * speed;

        this.segments.unshift({x: this.x, y: this.y});
        if (this.segments.length > this.length) this.segments.pop();
    }

    draw(camera) {
        let w = this.width();
        ctx.strokeStyle = this.color;
        ctx.lineWidth = w;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        ctx.beginPath();
        for (let i = 0; i < this.segments.length; i++) {
            ctx.lineTo(this.segments[i].x - camera.x, this.segments[i].y - camera.y);
        }
        ctx.stroke();

        // Draw Head Features
        let h = this.segments[0];
        let hx = h.x - camera.x;
        let hy = h.y - camera.y;

        ctx.save();
        ctx.translate(hx, hy);
        ctx.rotate(this.angle);
        
        // Snout
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.ellipse(w*0.6, 0, w*0.8, w*0.5, 0, 0, Math.PI*2); ctx.fill();
        // Nose
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(w*1.3, 0, w*0.15, 0, Math.PI*2); ctx.fill();
        // Eyes
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(w*0.3, -w*0.3, w*0.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(w*0.3, w*0.3, w*0.2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "black";
        ctx.beginPath(); ctx.arc(w*0.35, -w*0.3, w*0.1, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(w*0.35, w*0.3, w*0.1, 0, Math.PI*2); ctx.fill();
        
        ctx.restore();

        ctx.fillStyle = "white";
        ctx.font = "bold 12px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(this.name, hx, hy - w);
    }
}

class Food {
    constructor(x, y, size = 4, value = 2, isDrop = false) {
        this.x = x; this.y = y; this.size = size; this.value = value;
        this.isDrop = isDrop; this.spawnTime = Date.now();
        this.color = isDrop ? "#ffcc00" : `hsl(${Math.random()*360}, 70%, 60%)`;
    }
    draw(camera) {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x - camera.x, this.y - camera.y, this.size, 0, Math.PI*2);
        ctx.fill();
    }
}

// Initial state
player = new Dog(WORLD_SIZE/2, WORLD_SIZE/2, "#8B4513", "...", false);
for(let i=0; i<FOOD_COUNT; i++) spawnFood();
for(let i=0; i<BOT_COUNT; i++) spawnBot();

function spawnFood() {
    foods.push(new Food(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE));
}

function spawnBot() {
    let colors = ['#e67e22', '#e74c3c', '#9b59b6', '#3498db', '#2ecc71', '#f1c40f'];
    bots.push(new Dog(
        Math.random()*WORLD_SIZE, 
        Math.random()*WORLD_SIZE, 
        colors[Math.floor(Math.random()*colors.length)], 
        "Bot " + Math.floor(Math.random()*99)
    ));
}

function startGame() {
    kills = 0;
    player = new Dog(WORLD_SIZE/2, WORLD_SIZE/2, document.getElementById('color').value, document.getElementById('name').value, true);
    document.getElementById('overlay').style.display = 'none';
    gameActive = true;
}

function update() {
    let allDogs = [player, ...bots];
    
    player.update(allDogs);
    bots.forEach(b => b.update(allDogs));

    // Collision & Eating
    [player, ...bots].forEach(dog => {
        // Eat Food
        for (let i = foods.length - 1; i >= 0; i--) {
            let f = foods[i];
            if (Math.hypot(dog.x - f.x, dog.y - f.y) < dog.width() + 5) {
                dog.length += f.value;
                if (f.isDrop) foods.splice(i, 1);
                else { f.x = Math.random()*WORLD_SIZE; f.y = Math.random()*WORLD_SIZE; }
            }
        }
    });

    if (gameActive) {
        // Player Death
        if (player.x < 0 || player.x > WORLD_SIZE || player.y < 0 || player.y > WORLD_SIZE || checkCollision(player, bots)) {
            gameOver();
        }

        // Bot Death
        for (let i = bots.length - 1; i >= 0; i--) {
            if (bots[i].x < 0 || bots[i].x > WORLD_SIZE || bots[i].y < 0 || bots[i].y > WORLD_SIZE || checkCollision(bots[i], [player, ...bots.filter((_, idx) => idx !== i)])) {
                if (Math.hypot(bots[i].x - player.x, bots[i].y - player.y) < 500) kills++; // Close enough count as player kill for simplicity
                explodeToFood(bots[i]);
                bots.splice(i, 1);
                spawnBot();
            }
        }
    }
}

function checkCollision(dog, others) {
    for (let other of others) {
        for (let i = 0; i < other.segments.length; i++) {
            if (i < 5 && other === dog) continue; 
            let seg = other.segments[i];
            if (Math.hypot(dog.x - seg.x, dog.y - seg.y) < (other.width()/2 + 2)) return true;
        }
    }
    return false;
}

function explodeToFood(dog) {
    for(let i=0; i<dog.segments.length; i+=4) {
        foods.push(new Food(dog.segments[i].x, dog.segments[i].y, 5, 3, true));
    }
}

function gameOver() {
    gameActive = false;
    document.getElementById('final-kills').innerText = kills;
    document.getElementById('final-score').innerText = Math.floor(player.length);
    document.getElementById('stats-summary').style.display = 'block';
    document.getElementById('overlay').style.display = 'flex';
}

function draw() {
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let camera = { x: player.x - canvas.width/2, y: player.y - canvas.height/2 };

    // World Border
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 20;
    ctx.strokeRect(-camera.x, -camera.y, WORLD_SIZE, WORLD_SIZE);

    // Food
    foods.forEach(f => f.draw(camera));

    // Dogs
    bots.forEach(b => b.draw(camera));
    if (gameActive) player.draw(camera);

    // UI
    if (gameActive) {
        // Length
        ctx.fillStyle = "white";
        ctx.font = "bold 20px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(`Length: ${Math.floor(player.length)}`, 30, canvas.height - 30);

        // Minimap
        const mSize = 160;
        const mPadding = 20;
        const mx = canvas.width - mSize - mPadding;
        const my = canvas.height - mSize - mPadding;

        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.lineWidth = 2;
        ctx.fillRect(mx, my, mSize, mSize);
        ctx.strokeRect(mx, my, mSize, mSize);

        // Map Dots
        bots.forEach(b => {
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            ctx.beginPath();
            ctx.arc(mx + (b.x/WORLD_SIZE)*mSize, my + (b.y/WORLD_SIZE)*mSize, 2, 0, Math.PI*2);
            ctx.fill();
        });
        
        ctx.fillStyle = "#ffcc00";
        ctx.beginPath();
        ctx.arc(mx + (player.x/WORLD_SIZE)*mSize, my + (player.y/WORLD_SIZE)*mSize, 4, 0, Math.PI*2);
        ctx.fill();

        // Leaderboard
        let top = [player, ...bots].sort((a,b) => b.length - a.length).slice(0, 5);
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(canvas.width - 200, 20, 180, 130);
        ctx.fillStyle = "white";
        ctx.font = "14px sans-serif";
        top.forEach((d, i) => {
            let label = d === player ? "> " + d.name : d.name;
            ctx.fillStyle = d === player ? "#ffcc00" : "white";
            ctx.fillText(`${i+1}. ${label.substring(0,12)}`, canvas.width - 190, 45 + i*20);
            ctx.textAlign = "right";
            ctx.fillText(Math.floor(d.length), canvas.width - 30, 45 + i*20);
            ctx.textAlign = "left";
        });
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
